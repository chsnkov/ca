name: Scheduled Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Call API
        run: |
          curl --fail-with-body --show-error --silent --max-time 330 \
          -X POST https://ca-gules.vercel.app/api/scheduled \
          -H "Content-Type: application/json" \
          -d '{"token":"${{ secrets.ADMIN_TOKEN }}"}'
